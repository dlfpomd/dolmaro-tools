<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키워드 분석 — Dolmaro Tools</title>
  <link rel="stylesheet" href="../../css/hub.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 40px 20px;
    }
    .placeholder-icon {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      background: linear-gradient(135deg, #10b981, #047857);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
    }
    .placeholder h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .placeholder p {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 440px;
      margin-bottom: 28px;
    }
    .placeholder .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #0f172a;
      color: #fff;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.15s;
    }
    .placeholder .btn-home:hover { transform: translateY(-1px); text-decoration: none; }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-to-hub">← 홈</a>

  <div class="placeholder">
    <div class="placeholder-icon">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <h1>키워드 분석</h1>
    <p>검색량·경쟁도·관련 키워드 분석 도구.<br>클로드에서 작성해둔 앱을 여기로 이관할 예정입니다.</p>
    <a href="../../index.html" class="btn-home">← 홈으로 돌아가기</a>
  </div>
</body>
</html>
