  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .back-to-hub {
      position: fixed; top: 14px; left: 14px; z-index: 100;
      padding: 7px 14px; background: rgba(255, 255, 255, 0.95);
      border: 1px solid #e8e0d0; border-radius: 100px;
      font-size: 13px; color: #1a3a5c; text-decoration: none;
      backdrop-filter: blur(8px); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 0.15s;
    }
    .back-to-hub:hover { transform: translateX(-2px); }
    #boot { padding: 40px 20px; text-align: center; color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-to-hub" title="Dolmaro Tools 홈으로">← Dolmaro Tools</a>

    <div id="boot">🔄 이레한의원 블로그 작성기 불러오는 중... (React·Babel 로딩)</div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    window.storage = {
      async get(key) {
        const value = localStorage.getItem(key);
        return value ? { value } : null;
      },
      async set(key, value) { localStorage.setItem(key, value); return true; },
      async delete(key) { localStorage.removeItem(key); return true; }
    };
  </script>

  <script type="text/babel" data-presets="react" src="js/app.jsx"></script>
</body>
